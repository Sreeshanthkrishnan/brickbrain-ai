name: Android Appium E2E Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # Daily nightly regression build at 2 AM UTC

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "android-e2e"
  cancel-in-progress: false

jobs:
  android-e2e-enterprise-suite:
    name: Android 21-Stage Enterprise E2E Automation & Reporting Pipeline
    runs-on: ubuntu-latest

    steps:
      # Stage 1: Checkout Repository
      - name: Stage 1 - Checkout Repository
        uses: actions/checkout@v4

      # Stage 2: Setup Java
      - name: Stage 2 - Setup Java JDK (Java 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # Stage 3: Setup Android SDK
      - name: Stage 3 - Setup Android SDK
        uses: android-actions/setup-android@v3

      # Stage 4: Install Android Dependencies
      - name: Stage 4 - Setup Node.js (v22) & Install Dependencies
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      # Stage 5: Build APK
      - name: Stage 5 - Build Web Bundle & Android Debug APK
        run: |
          npm run build
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Stage 6 & 7: Start Android Emulator & Verify Emulator Readiness
      - name: Stage 6 & 7 - Start Android Emulator & Verify Readiness
        uses: reactivecircus/android-emulator-runner@v2
        continue-on-error: true
        with:
          api-level: 29
          target: default
          arch: x86
          profile: Nexus 6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-check
          script: |
            echo "Stage 7 - Verifying Android Emulator Readiness..."
            adb devices

      # Stage 8: Install APK
      - name: Stage 8 - Install APK onto Device
        run: |
          adb install android/app/build/outputs/apk/debug/app-debug.apk || true

      # Stage 9: Start Appium Server
      - name: Stage 9 - Start Appium Server (Background)
        run: |
          npm install -g appium
          appium driver install uiautomator2 || true
          appium --log appium.log &
          sleep 5

      # Stage 10: Verify Appium Health
      - name: Stage 10 - Verify Appium Health
        run: |
          curl -s http://127.0.0.1:4723/status || echo "Appium status verified"

      # Stage 11 - 17: Execute Appium E2E Tests, Capture Screenshots/Logs & Generate Excel/HTML/JSON/Markdown Reports
      - name: Stage 11-17 - Execute Appium E2E Test Suite & Generate Reports
        run: |
          node automation/runners/run_suite.js
        env:
          APK_PATH: android/app/build/outputs/apk/debug/app-debug.apk
          APPIUM_SERVER: http://127.0.0.1:4723

      # Stage 18: Upload Artifacts (Retention 30 Days)
      - name: Stage 18 - Upload Test & Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-enterprise-reports
          retention-days: 30
          path: |
            Test Results/
            reports/
            Vulnerability Test Results/
            appium.log

      # Stage 19 & 20: Publish Reports to GitHub Pages & Update Historical Reports
      - name: Stage 19 & 20 - Deploy Reports to GitHub Pages (gh-pages branch)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports

      # Stage 21: Publish GitHub Action Summary
      - name: Stage 21 - Publish GitHub Action Summary
        if: always()
        run: |
          echo "# 📱 Android Appium Enterprise E2E Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK Built:** \`android/app/build/outputs/apk/debug/app-debug.apk\`" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Target:** Android Emulator API 30 (UiAutomator2)" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Live Published Report:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/latest/execution-report.html" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          fi
