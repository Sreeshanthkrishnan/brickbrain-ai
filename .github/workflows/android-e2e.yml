name: Android Appium E2E Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # Daily nightly regression build at 2 AM UTC

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android-e2e-suite:
    name: Build APK, Boot Emulator & Run 400+ Appium Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK (Java 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js (v18)
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Build Web Bundle & Sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Install Appium Server
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Start Appium Server (Background)
        run: |
          appium --log appium.log &
          sleep 5

      - name: Run Android Emulator & Appium E2E Test Suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          script: |
            adb devices
            adb install android/app/build/outputs/apk/debug/app-debug.apk
            node selenium_tests/utils/generate_400_cases.js
            node selenium_tests/runner.js

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Appium Test & Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-e2e-execution-reports
          retention-days: 30
          path: |
            selenium_tests/reports/
            Vulnerability Test Results/
            appium.log

      - name: Publish GitHub Actions Summary
        if: always()
        run: |
          echo "# 📱 Android Appium E2E Automation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK Built:** \`android/app/build/outputs/apk/debug/app-debug.apk\`" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Target:** Android Emulator API 30 (UIAutomator2)" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f selenium_tests/reports/summary/summary.md ]; then
            cat selenium_tests/reports/summary/summary.md >> $GITHUB_STEP_SUMMARY
          fi
